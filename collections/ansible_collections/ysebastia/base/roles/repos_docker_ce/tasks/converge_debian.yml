---
- name: Ensure GPG is installed
  become: true
  ansible.builtin.apt:
    name:
      - gpg
- name: Set DPKG architecture
  ansible.builtin.set_fact:
    docker_ce_dpkg_arch: "{{ 'amd64' if ansible_facts.architecture == 'x86_64' else ansible_facts.architecture }}"
- name: Fix Docker-CE repository
  become: true
  ansible.builtin.apt_repository:
    repo: deb https://download.docker.com/linux/{{ ansible_facts.distribution | lower }} {{ ansible_facts.distribution_release }} stable
    filename: docker-ce
    state: absent
- name: Configure Docker-CE repository
  become: true
  deb822_repository:
    name: docker-ce
    types: deb
    uris: https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}
    suites: "{{ ansible_facts.distribution_release | lower }}"
    components: stable
    architectures: "{{ docker_ce_dpkg_arch }}"
    signed_by: https://download.docker.com/linux/{{ ansible_facts.distribution | lower }}/gpg
  environment:
    https_proxy: "{{ docker_ce_https_proxy | default('') }}"
