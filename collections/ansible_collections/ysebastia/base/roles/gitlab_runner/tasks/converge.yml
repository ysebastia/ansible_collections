---
- name: Ensure GPG is installed
  become: true
  ansible.builtin.apt:
    name:
      - gpg
- name: Configure Gitlab-runner repository
  become: true
  deb822_repository:
    name: gitlab-runner
    types: deb
    uris: https://packages.gitlab.com/runner/gitlab-runner/{{ ansible_facts.distribution | lower }}
    suites: "{{ ansible_facts.distribution | lower }}"
    components: main
    signed_by: https://packages.gitlab.com/gpg.key
  environment:
    https_proxy: "{{ gitlab_https_proxy | default('') }}"
- name: Install GITLAB-RUNNER
  become: true
  ansible.builtin.apt:
    name:
      - gitlab-runner
      - python3-gitlab
    update_cache: true
- name: Create directory gitlab-runner.service.d
  become: true
  ansible.builtin.file:
    path: "/etc/systemd/system/gitlab-runner.service.d"
    state: directory
    mode: "0755"
- name: Create http-proxy.conf
  become: true
  ansible.builtin.template:
    src: http-proxy.conf.j2
    dest: /etc/systemd/system/gitlab-runner.service.d/http-proxy.conf
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart gitlab-runner
